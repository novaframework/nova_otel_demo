name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        otp: ['27.2', '28.0']
        rebar3: ['3.24']
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          rebar3-version: ${{ matrix.rebar3 }}

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            build-${{ runner.os }}-otp${{ matrix.otp }}-

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: ~/.cache/rebar3
          key: rebar3-${{ runner.os }}-otp${{ matrix.otp }}-${{ hashFiles('rebar.lock') }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp${{ matrix.otp }}-

      - name: Compile
        run: rebar3 compile

      - name: Xref
        run: rebar3 xref

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Common Test
        run: rebar3 ct
